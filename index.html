        :root[data-theme="hanami"] { --bg-main: #fce4ec; --bg-sec: #f8bbd0; --bg-card: #f48fb1; --text-main: #880e4f; --text-muted: #c2185b; --accent: #e91e63; --sci-btn: #f06292; --border-card: none; }
        :root[data-theme="sunrise"] { --bg-main: #fbe9e7; --bg-sec: #ffccbc; --bg-card: #ffab91; --text-main: #bf360c; --text-muted: #d84315; --accent: #ff5722; --sci-btn: #ff8a65; --border-card: none; }
        :root[data-theme="cotton-candy"] { --bg-main: #f3e5f5; --bg-sec: #e1bee7; --bg-card: #ce93d8; --text-main: #4a148c; --text-muted: #6a1b9a; --accent: #9c27b0; --sci-btn: #ba68c8; --border-card: none; }
        :root[data-theme="lofi-vibes"] { --bg-main: #2b213a; --bg-sec: #1f182b; --bg-card: #3b2e4d; --text-main: #eaddff; --text-muted: #b8a5d8; --accent: #9d81d4; --sci-btn: #4f3d68; --border-card: none; }
        :root[data-theme="desert-khaki"] { --bg-main: #efebe9; --bg-sec: #d7ccc8; --bg-card: #bcaaa4; --text-main: #3e2723; --text-muted: #5d4037; --accent: #795548; --sci-btn: #a1887f; --border-card: none; }
        :root[data-theme="sunset"] { --bg-main: #3e2723; --bg-sec: #26140f; --bg-card: #4e342e; --text-main: #fbe9e7; --text-muted: #d84315; --accent: #ff7043; --sci-btn: #5d4037; --border-card: none; }
        :root[data-theme="chroma-glow"] { --bg-main: #121212; --bg-sec: #1e1e1e; --bg-card: #2c2c2c; --text-main: #ffffff; --text-muted: #a0a0a0; --accent: #00e5ff; --sci-btn: #424242; --border-card: none; }
        :root[data-theme="forest"] { --bg-main: #1b5e20; --bg-sec: #144517; --bg-card: #2e7d32; --text-main: #e8f5e9; --text-muted: #a5d6a7; --accent: #66bb6a; --sci-btn: #388e3c; --border-card: none; }
        :root[data-theme="crimson"] { --bg-main: #b71c1c; --bg-sec: #880e4f; --bg-card: #c62828; --text-main: #ffebee; --text-muted: #ffcdd2; --accent: #ff5252; --sci-btn: #d32f2f; --border-card: none; }
        :root[data-theme="midnight-blurple"] { --bg-main: #0d1117; --bg-sec: #010409; --bg-card: #161b22; --text-main: #c9d1d9; --text-muted: #8b949e; --accent: #5865F2; --sci-btn: #21262d; --border-card: 1px solid #30363d; }
        :root[data-theme="mars"] { --bg-main: #bf360c; --bg-sec: #870000; --bg-card: #d84315; --text-main: #fbe9e7; --text-muted: #ffab91; --accent: #ff5722; --sci-btn: #e64a19; --border-card: none; }
        :root[data-theme="dusk"] { --bg-main: #311b92; --bg-sec: #1a005d; --bg-card: #4527a0; --text-main: #ede7f6; --text-muted: #b388ff; --accent: #651fff; --sci-btn: #512da8; --border-card: none; }
        :root[data-theme="under-the-sea"] { --bg-main: #004d40; --bg-sec: #00251a; --bg-card: #00695c; --text-main: #e0f2f1; --text-muted: #80cbc4; --accent: #1de9b6; --sci-btn: #00796b; --border-card: none; }
        :root[data-theme="retro-storm"] { --bg-main: #263238; --bg-sec: #102027; --bg-card: #37474f; --text-main: #eceff1; --text-muted: #90a4ae; --accent: #00bcd4; --sci-btn: #455a64; --border-card: none; }
        :root[data-theme="neon-nights"] { --bg-main: #050505; --bg-sec: #121212; --bg-card: #1f1f1f; --text-main: #00ffff; --text-muted: #ff00ff; --accent: #ff00ff; --sci-btn: #2a2a2a; --border-card: 1px solid #333; }
        :root[data-theme="strawberry-lemonade"] { --bg-main: #fff0f5; --bg-sec: #ffb6c1; --bg-card: #ff69b4; --text-main: #8b0000; --text-muted: #c71585; --accent: #ff1493; --sci-btn: #ff82ab; --border-card: none; }
        :root[data-theme="aurora"] { --bg-main: #00332a; --bg-sec: #001f1a; --bg-card: #004d40; --text-main: #e0f2f1; --text-muted: #69f0ae; --accent: #00e676; --sci-btn: #00695c; --border-card: none; }
        :root[data-theme="sepia"] { --bg-main: #f4ecd8; --bg-sec: #e8dcc4; --bg-card: #d5c4a1; --text-main: #5c4033; --text-muted: #8b5a2b; --accent: #a0522d; --sci-btn: #c4b087; --border-card: none; }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; transition: background 0.3s, color 0.3s, border 0.3s; }
        button, .tab-btn { user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        input, select { user-select: auto; -webkit-user-select: auto; }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-main); margin: 0; height: 100dvh; display: flex; flex-direction: column; color: var(--text-main); overflow: hidden; }
        
        .tab-bar { display: flex; background: var(--bg-sec); padding: 5px; flex-shrink: 0; align-items: center;}
        .tab-btn { flex: 1; padding: 15px 5px; background: transparent; border: none; color: var(--text-muted); font-size: 1.05rem; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; display:flex; justify-content:center; align-items:center; gap: 8px;}
        .tab-btn.active { color: var(--text-main); border-bottom: 3px solid var(--accent); }
        .tab-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        .tab-content { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
        .tab-content.active { display: flex; } /* TABS NOW RELY STRICTLY ON THIS CSS CLASS */

        #display { width: 100%; padding: 20px; margin-bottom: 10px; font-size: 2rem; background: var(--bg-sec); border: var(--border-card); color: var(--text-main); border-radius: 12px; text-align: right; outline: none; }
        #display:focus { border: 2px solid var(--accent); padding: 18px; }
        .result-box { padding: 15px; margin-bottom: 20px; border-radius: 12px; background: var(--bg-card); font-size: 1.5rem; font-weight: bold; border: var(--border-card); border-left: 5px solid var(--accent); text-align: right; min-height: 30px; }
        
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        button.key { background: var(--bg-card); border: var(--border-card); border-radius: 12px; color: var(--text-main); font-size: 1.2rem; cursor: pointer; font-weight: bold; padding: 15px 0; }
        button.key:active { transform: scale(0.95); opacity: 0.8; }
        button.key.sci { background: var(--sci-btn); font-size: 1rem; }
        button.key.op { background: var(--accent); color: var(--bg-main); }
        button.key.action { background: #ed4245; color: white;}
        
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-calc { padding: 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 12px; color: white; cursor: pointer; }
        .btn-calc:active { transform: scale(0.98); }
        .btn-bodmas { background: #23a559; color: white; }
        .btn-no-bodmas { background: var(--accent); color: var(--bg-main); }

        .history-container { background: var(--bg-sec); border: var(--border-card); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; margin-bottom: 20px; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--text-muted); font-weight: bold; }
        .btn-clear-history { background: transparent; color: #ed4245; border: none; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        #history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: var(--bg-card); padding: 10px; border-radius: 8px; font-size: 1.1rem; text-align: right; border-left: 4px solid var(--accent); }

        .conv-group, .theme-group { margin-bottom: 15px; }
        .conv-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-weight: bold; }
        select, input.conv-input { width: 100%; padding: 15px; font-size: 1.2rem; background: var(--bg-card); border: var(--border-card); color: var(--text-main); border-radius: 8px; outline: none; }
        input.conv-input:focus { border: 2px solid var(--accent); padding: 13px;}
        optgroup { background: var(--bg-sec); color: var(--text-muted); font-weight: bold; }
        option { background: var(--bg-card); color: var(--text-main); }
        .btn-convert { width: 100%; padding: 15px; background: var(--accent); border: none; color: var(--bg-main); font-size: 1.2rem; border-radius: 8px; font-weight: bold; margin-bottom: 30px; cursor: pointer;}
        
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .theme-btn-card { background: var(--bg-card); border: 2px solid transparent; padding: 15px 10px; border-radius: 8px; color: var(--text-main); font-weight: bold; font-size: 1rem; text-align: center; cursor: pointer; }
        .theme-btn-card:active { transform: scale(0.95); }
        .theme-btn-card.active-theme { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        #toast { visibility: hidden; min-width: 250px; background-color: var(--bg-sec); border: 1px solid var(--accent); color: var(--text-main); text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0px 4px 12px rgba(0,0,0,0.5); opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

<div id="toast">Message here</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('calc')" id="btn-calc">Calc</button>
    <button class="tab-btn" onclick="switchTab('conv')" id="btn-conv">Conv</button>
    <button class="tab-btn" onclick="switchTab('theme')" id="btn-theme">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zM6.5 11.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-4c-.83 0-1.5-.67-1.5-1.5S9.67 4.5 10.5 4.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm5 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        Themes
    </button>
</div>

<div id="tab-calc" class="tab-content active">
    <input type="text" id="display" readonly placeholder="0">
    <div class="result-box" id="result">0</div>
    
    <div class="keypad">
        <button class="key sci" onclick="append('sin(')">sin</button> <button class="key sci" onclick="append('cos(')">cos</button> <button class="key sci" onclick="append('tan(')">tan</button> <button class="key sci" onclick="append('√(')">√</button>
        <button class="key action" onclick="clearDisplay()">C</button> <button class="key sci" onclick="append('^')">^</button> <button class="key sci" onclick="append('π')">π</button> <button class="key op" onclick="append('÷')">÷</button>
        <button class="key" onclick="append('7')">7</button> <button class="key" onclick="append('8')">8</button> <button class="key" onclick="append('9')">9</button> <button class="key op" onclick="append('x')">x</button>
        <button class="key" onclick="append('4')">4</button> <button class="key" onclick="append('5')">5</button> <button class="key" onclick="append('6')">6</button> <button class="key op" onclick="append('-')">-</button>
        <button class="key" onclick="append('1')">1</button> <button class="key" onclick="append('2')">2</button> <button class="key" onclick="append('3')">3</button> <button class="key op" onclick="append('+')">+</button>
        <button class="key" onclick="append('0')">0</button> <button class="key" onclick="append('.')">.</button> <button class="key" onclick="append(')')">)</button> <button class="key action" onclick="deleteLast()">DEL</button>
    </div>
    
    <div class="calc-row">
        <button class="btn-calc btn-bodmas" onclick="calculateBODMAS()">= BODMAS</button>
        <button class="btn-calc btn-no-bodmas" onclick="calculateNoBODMAS()">= Seq</button>
    </div>
    
    <div class="history-container">
        <div class="history-header"><span>History</span><button class="btn-clear-history" onclick="clearHistory()">Clear</button></div>
        <div id="history-list"></div>
    </div>
</div>

<div id="tab-conv" class="tab-content">
    <div class="conv-group">
        <input type="text" id="search-units" class="conv-input" placeholder="🔍 Search units..." onkeyup="renderFromDropdown()">
    </div>
    <div class="conv-group"><label>Value:</label><input type="number" id="conv-val" class="conv-input" placeholder="0"></div>
    <div class="conv-group"><label>From:</label><select id="conv-from" onchange="updateToDropdown()"></select></div>
    <div class="conv-group"><label>To:</label><select id="conv-to"></select></div>
    <button class="btn-convert" onclick="convertUnits()">Convert</button>
    <div class="result-box" style="text-align:center;" id="conv-result">Result</div>
</div>

<div id="tab-theme" class="tab-content">
    <div class="theme-group">
        <input type="text" id="search-theme-input" class="conv-input" placeholder="🔍 Search Themes..." onkeyup="renderThemes()">
    </div>
    <div class="theme-grid" id="theme-grid"></div>
</div>

<script>
    /* --- PURE CLASS-BASED TAB SWITCHING --- */
    function switchTab(tabId) {
        // Remove active class from all tabs and buttons
        const allContents = document.querySelectorAll('.tab-content');
        const allButtons = document.querySelectorAll('.tab-btn');
        
        for(let i = 0; i < allContents.length; i++) {
            allContents[i].classList.remove('active');
            allButtons[i].classList.remove('active');
        }
        
        // Add active class exactly to what we clicked
        const targetTab = document.getElementById('tab-' + tabId);
        const targetBtn = document.getElementById('btn-' + tabId);
        
        if (targetTab && targetBtn) {
            targetTab.classList.add('active');
            targetBtn.classList.add('active');
            localStorage.setItem('activeTab', tabId);
        } else {
            document.getElementById('tab-calc').classList.add('active');
            document.getElementById('btn-calc').classList.add('active');
        }
    }

    let calcHistory = [];
    let liveCurrencyRates = {}; 

    const allThemes = [
        { id: 'dark', name: 'Discord Dark', color: '#5865F2' }, { id: 'midnight', name: 'Discord Midnight', color: '#000000' }, { id: 'light', name: 'Discord Light', color: '#ffffff' }, { id: 'blurple', name: 'Classic Blurple', color: '#23272a' },
        { id: 'mint-apple', name: 'Mint Apple', color: '#4caf50' }, { id: 'citrus-sherbert', name: 'Citrus Sherbert', color: '#ff9800' }, { id: 'retro-raincloud', name: 'Retro Raincloud', color: '#607d8b' }, { id: 'hanami', name: 'Hanami', color: '#e91e63' },
        { id: 'sunrise', name: 'Sunrise', color: '#ff5722' }, { id: 'cotton-candy', name: 'Cotton Candy', color: '#9c27b0' }, { id: 'lofi-vibes', name: 'Lofi Vibes', color: '#9d81d4' }, { id: 'desert-khaki', name: 'Desert Khaki', color: '#795548' },
        { id: 'sunset', name: 'Sunset', color: '#ff7043' }, { id: 'chroma-glow', name: 'Chroma Glow', color: '#00e5ff' }, { id: 'forest', name: 'Forest', color: '#66bb6a' }, { id: 'crimson', name: 'Crimson', color: '#ff5252' },
        { id: 'midnight-blurple', name: 'Midnight Blurple', color: '#58a6ff' }, { id: 'mars', name: 'Mars', color: '#bf360c' }, { id: 'dusk', name: 'Dusk', color: '#651fff' }, { id: 'under-the-sea', name: 'Under The Sea', color: '#1de9b6' },
        { id: 'retro-storm', name: 'Retro Storm', color: '#00bcd4' }, { id: 'neon-nights', name: 'Neon Nights', color: '#ff00ff' }, { id: 'strawberry-lemonade', name: 'Strawberry', color: '#ff1493' }, { id: 'aurora', name: 'Aurora', color: '#00e676' }, { id: 'sepia', name: 'Sepia', color: '#a0522d' }
    ];

    function applyTheme(themeId) {
        document.documentElement.setAttribute('data-theme', themeId);
        localStorage.setItem('appTheme', themeId);
        let activeObj = allThemes.find(t => t.id === themeId);
        if(activeObj) document.getElementById('meta-theme-color').setAttribute('content', activeObj.color);
        renderThemes(); 
    }

    function renderThemes() {
        const grid = document.getElementById('theme-grid');
        const searchInput = document.getElementById('search-theme-input');
        const q = searchInput ? searchInput.value.toLowerCase() : "";
        const currentTheme = document.documentElement.getAttribute('data-theme');
        grid.innerHTML = '';
        
        allThemes.forEach(t => {
            if (t.name.toLowerCase().includes(q)) {
                let div = document.createElement('div');
                div.className = 'theme-btn-card ' + (currentTheme === t.id ? 'active-theme' : '');
                div.innerHTML = `<span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:${t.color}; margin-right:8px;"></span>${t.name}`;
                div.onclick = () => applyTheme(t.id);
                grid.appendChild(div);
            }
        });
    }

    const unitCategories = {
        currency: { USD: "US Dollar", EUR: "Euro", GBP: "Pound", INR: "Rupee", JPY: "Yen", AUD: "AUD", CAD: "CAD" },
        length: { m: "Meters", cm: "Centimeters", mm: "Millimeters", km: "Kilometers", in: "Inches", ft: "Feet", yd: "Yards", mi: "Miles" },
        weight: { kg: "Kilograms", g: "Grams", mg: "Milligrams", lb: "Pounds", oz: "Ounces
