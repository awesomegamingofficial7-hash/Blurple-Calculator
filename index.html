    <title>Blurple Pro App</title>
    
    <style>
        /* Native App Feel Fixes */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        button, .tab-btn { user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        
        body { font-family: 'Segoe UI', sans-serif; background: #23272a; margin: 0; height: 100dvh; display: flex; flex-direction: column; color: #ffffff; overflow: hidden; }
        .tab-bar { display: flex; background: #1e1f22; padding: 10px; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 15px; background: transparent; border: none; color: #8e9297; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #ffffff; border-bottom: 3px solid #5865F2; }
        .tab-content { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        #display { width: 100%; padding: 20px; margin-bottom: 10px; font-size: 2rem; background: #1e1f22; border: none; color: #ffffff; border-radius: 12px; text-align: right; outline: none; }
        #display:focus { border: 2px solid #5865F2; }
        .result-box { padding: 15px; margin-bottom: 20px; border-radius: 12px; background: #2c2f33; font-size: 1.5rem; font-weight: bold; border-left: 5px solid #5865F2; text-align: right; min-height: 30px; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        button.key { background: #2c2f33; border: none; border-radius: 12px; color: white; font-size: 1.2rem; cursor: pointer; font-weight: bold; padding: 15px 0; transition: transform 0.1s; }
        button.key:active { background: #1e1f22; transform: scale(0.95); }
        button.key.sci { background: #4f545c; font-size: 1rem; }
        button.key.op { background: #5865F2; }
        button.key.action { background: #ed4245; }
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-calc { padding: 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 12px; color: white; cursor: pointer; }
        .btn-bodmas { background: #4CAF50; } .btn-no-bodmas { background: #5865F2; }

        .history-container { background: #1e1f22; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: #8e9297; }
        .history-item { background: #2c2f33; padding: 10px; border-radius: 8px; font-size: 1.1rem; text-align: right; border-left: 4px solid #5865F2; margin-bottom: 10px; }
        .history-item.seq { border-left-color: #2196F3; }

        .conv-group { margin-bottom: 15px; }
        select, .conv-input { width: 100%; padding: 15px; font-size: 1.2rem; background: #2c2f33; border: none; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-convert { width: 100%; padding: 15px; background: #5865F2; border: none; color: white; font-size: 1.2rem; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        #toast.offline { background-color: #ed4245; } #toast.online { background-color: #4CAF50; }
    </style>
</head>
<body>

<div id="toast">Message here</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('calc')" id="btn-calc">Calculator</button>
    <button class="tab-btn" onclick="switchTab('conv')" id="btn-conv">Converter</button>
</div>

<div id="tab-calc" class="tab-content active">
    <input type="text" id="display" readonly placeholder="0">
    <div class="result-box" id="result">0</div>
    <div class="keypad">
        <button class="key sci" onclick="append('sin(')">sin</button><button class="key sci" onclick="append('cos(')">cos</button><button class="key sci" onclick="append('tan(')">tan</button><button class="key sci" onclick="append('√(')">√</button>
        <button class="key action" onclick="clearDisplay()">C</button><button class="key sci" onclick="append('^')">^</button><button class="key sci" onclick="append('π')">π</button><button class="key op" onclick="append('÷')">÷</button>
        <button class="key" onclick="append('7')">7</button><button class="key" onclick="append('8')">8</button><button class="key" onclick="append('9')">9</button><button class="key op" onclick="append('x')">x</button>
        <button class="key" onclick="append('4')">4</button><button class="key" onclick="append('5')">5</button><button class="key" onclick="append('6')">6</button><button class="key op" onclick="append('-')">-</button>
        <button class="key" onclick="append('1')">1</button><button class="key" onclick="append('2')">2</button><button class="key" onclick="append('3')">3</button><button class="key op" onclick="append('+')">+</button>
        <button class="key" onclick="append('0')">0</button><button class="key" onclick="append('.')">.</button><button class="key" onclick="append(')')">)</button><button class="key action" onclick="deleteLast()">DEL</button>
    </div>
    <div class="calc-row">
        <button class="btn-calc btn-bodmas" onclick="calculateBODMAS()">= BODMAS</button>
        <button class="btn-calc btn-no-bodmas" onclick="calculateNoBODMAS()">= Seq</button>
    </div>
    <div class="history-container">
        <div class="history-header"><span>History</span><button style="background:none; border:none; color:#ed4245;" onclick="clearHistory()">Clear</button></div>
        <div id="history-list"></div>
    </div>
</div>

<div id="tab-conv" class="tab-content">
    <div class="conv-group"><input type="text" id="search-units" class="conv-input" placeholder="🔍 Search units..." onkeyup="renderFromDropdown()"></div>
    <div class="conv-group"><label>Value:</label><input type="number" id="conv-val" class="conv-input" placeholder="0"></div>
    <div class="conv-group"><label>From:</label><select id="conv-from" onchange="updateToDropdown()"></select></div>
    <div class="conv-group"><label>To:</label><select id="conv-to"></select></div>
    <button class="btn-convert" onclick="convertUnits()">Convert</button>
    <div class="result-box" style="text-align:center; margin-top:20px;" id="conv-result">Result</div>
</div>

<script>
    let calcHistory = [];
    let liveCurrencyRates = {};
    const unitCategories = {
        currency: { USD: "US Dollar", EUR: "Euro", GBP: "Pound", INR: "Rupee", JPY: "Yen" },
        length: { m: "Meters", cm: "Centimeters", km: "Kilometers", in: "Inches", ft: "Feet", mi: "Miles" },
        weight: { kg: "Kilograms", g: "Grams", lb: "Pounds", oz: "Ounces" },
        data: { b: "Bytes", kb: "KB", mb: "MB", gb: "GB", tb: "TB", kib: "KiB", mib: "MiB", gib: "GiB" },
        time: { s: "Seconds", min: "Minutes", hr: "Hours", day: "Days" }
    };
    const conversionRates = {
        length: { m: 1, cm: 0.01, km: 1000, in: 0.0254, ft: 0.3048, mi: 1609.34 },
        weight: { kg: 1, g: 0.001, lb: 0.4535, oz: 0.0283 },
        data: { b: 1, kb: 1e3, mb: 1e6, gb: 1e9, tb: 1e12, kib: 1024, mib: 1048576, gib: 1073741824 },
        time: { s: 1, min: 60, hr: 3600, day: 86400 }
    };

    function showToast(msg, type) {
        let t = document.getElementById("toast"); t.innerText = msg; t.className = "show " + type;
        setTimeout(() => { t.className = ""; }, 4000);
    }
    window.addEventListener('offline', () => showToast("Offline mode", "offline"));
    window.addEventListener('online', () => { showToast("Online! Updating rates", "online"); fetchRates(); });

    async function fetchRates() {
        try {
            let res = await fetch('https://open.er-api.com/v6/latest/USD');
            let data = await res.json();
            liveCurrencyRates = data.rates;
            localStorage.setItem('savedRates', JSON.stringify(liveCurrencyRates));
        } catch (e) {}
    }

    window.onload = () => {
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
        let sTab = localStorage.getItem('activeTab'); if(sTab) switchTab(sTab);
        let sHist = localStorage.getItem('calcHistory'); if(sHist) { calcHistory = JSON.parse(sHist); renderHistory(); }
        let sRates = localStorage.getItem('savedRates'); if(sRates) liveCurrencyRates = JSON.parse(sRates);
        renderFromDropdown();
        fetchRates();
    };

    function switchTab(t) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        document.getElementById('btn-'+t).classList.add('active');
        localStorage.setItem('activeTab', t);
    }

    function append(c) { document.getElementById('display').value += c; }
    function clearDisplay() { document.getElementById('display').value = ''; document.getElementById('result').innerText = '0'; }
    function deleteLast() { let d = document.getElementById('display'); d.value = d.value.slice(0,-1); }

    function calculateBODMAS() {
        try {
            let val = document.getElementById('display').value;
            let clean = val.replace(/x/g, '*').replace(/÷/g, '/').replace(/\^/g, '**').replace(/π/g, 'Math.PI').replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(').replace(/√\(/g, 'Math.sqrt(');
            let res = Math.round(eval(clean) * 10000) / 10000;
            document.getElementById('result').innerText = "BODMAS: " + res;
            calcHistory.push({expr: val, res: res, type: 'BODMAS'});
            localStorage.setItem('calcHistory', JSON.stringify(calcHistory)); renderHistory();
        } catch(e) { document.getElementById('result').innerText = "Error"; }
    }

    function calculateNoBODMAS() {
        try {
            let val = document.getElementById('display').value;
            let clean = val.replace(/x/g, '*').replace(/÷/g, '/');
            let nums = clean.split(/([+\-*/])/).filter(x => !['+','-','*','/'].includes(x));
            let ops = clean.split('').filter(x => ['+','-','*','/'].includes(x));
            let total = parseFloat(nums[0]);
            for(let i=0; i<ops.length; i++){
                let n = parseFloat(nums[i+1]);
                if(ops[i]=='+') total += n; else if(ops[i]=='-') total -= n;
                else if(ops[i]=='*') total *= n; else if(ops[i]=='/') total /= n;
            }
            total = Math.round(total * 10000) / 10000;
            document.getElementById('result').innerText = "Seq: " + total;
            calcHistory.push({expr: val, res: total, type: 'Seq'});
            localStorage.setItem('calcHistory', JSON.stringify(calcHistory)); renderHistory();
        } catch(e) { document.getElementById('result').innerText = "Error"; }
    }

    function renderHistory() {
        let l = document.getElementById('history-list'); l.innerHTML = '';
        calcHistory.slice().reverse().forEach(h => {
            let d = document.createElement('div'); d.className = 'history-item ' + (h.type === 'Seq' ? 'seq' : '');
            d.innerHTML = `<small>${h.expr}</small><br>${h.type}: ${h.res}`;
            l.appendChild(d);
        });
    }

    function clearHistory() { calcHistory = []; localStorage.removeItem('calcHistory'); renderHistory(); }

    function renderFromDropdown() {
        let q = document.getElementById('search-units').value.toLowerCase();
        let s = document.getElementById('conv-from'); s.innerHTML = '';
        for(let cat in unitCategories){
            let g = document.createElement('optgroup'); g.label = cat.toUpperCase();
            let added = false;
            for(let k in unitCategories[cat]){
                if(unitCategories[cat][k].toLowerCase().includes(q) || k.toLowerCase().includes(q)){
                    g.appendChild(new Option(unitCategories[cat][k], k)); added = true;
                }
            }
            if(added) s.appendChild(g);
        }
        updateToDropdown();
    }

    function updateToDropdown() {
        let f = document.getElementById('conv-from').value;
        let t = document.getElementById('conv-to');
        let cat = Object.keys(unitCategories).find(c => unitCategories[c][f]);
        t.innerHTML = '';
        for(let k in unitCategories[cat]) t.appendChild(new Option(unitCategories[cat][k], k));
    }

    function convertUnits() {
        let v = parseFloat(document.getElementById('conv-val').value);
        let f = document.getElementById('conv-from').value;
        let t = document.getElementById('conv-to').value;
        if(isNaN(v)) return;
        let res = 0;
        let cat = Object.keys(unitCategories).find(c => unitCategories[c][f]);
        if(cat === 'currency'){
            res = (v / liveCurrencyRates[f]) * liveCurrencyRates[t];
        } else {
            res = (v * conversionRates[cat][f]) / conversionRates[cat][t];
        }
        document.getElementById('conv-result').innerText = Math.round(res*10000)/10000 + " " + t.toUpperCase();
    }
</script>
</body>
    </html>
