<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script>
        // --- 1. GLOBALS ---
        let calcHistory = [];
        let liveCurrencyRates = {}; 
        
        const allThemes = [
            { id: 'dark', name: 'Discord Dark', color: '#5865F2' }, { id: 'midnight', name: 'Discord Midnight', color: '#000000' }, { id: 'light', name: 'Discord Light', color: '#ffffff' }, { id: 'blurple', name: 'Classic Blurple', color: '#23272a' },
            { id: 'mint-apple', name: 'Mint Apple', color: '#4caf50' }, { id: 'citrus-sherbert', name: 'Citrus Sherbert', color: '#ff9800' }, { id: 'retro-raincloud', name: 'Retro Raincloud', color: '#607d8b' }, { id: 'hanami', name: 'Hanami', color: '#e91e63' },
            { id: 'sunrise', name: 'Sunrise', color: '#ff5722' }, { id: 'cotton-candy', name: 'Cotton Candy', color: '#9c27b0' }, { id: 'lofi-vibes', name: 'Lofi Vibes', color: '#9d81d4' }, { id: 'desert-khaki', name: 'Desert Khaki', color: '#795548' },
            { id: 'sunset', name: 'Sunset', color: '#ff7043' }, { id: 'chroma-glow', name: 'Chroma Glow', color: '#00e5ff' }, { id: 'forest', name: 'Forest', color: '#66bb6a' }, { id: 'crimson', name: 'Crimson', color: '#ff5252' },
            { id: 'midnight-blurple', name: 'Midnight Blurple', color: '#58a6ff' }, { id: 'mars', name: 'Mars', color: '#bf360c' }, { id: 'dusk', name: 'Dusk', color: '#651fff' }, { id: 'under-the-sea', name: 'Under The Sea', color: '#1de9b6' },
            { id: 'retro-storm', name: 'Retro Storm', color: '#00bcd4' }, { id: 'neon-nights', name: 'Neon Nights', color: '#ff00ff' }, { id: 'strawberry-lemonade', name: 'Strawberry', color: '#ff1493' }, { id: 'aurora', name: 'Aurora', color: '#00e676' }, { id: 'sepia', name: 'Sepia', color: '#a0522d' }
        ];

        const unitCategories = {
            currency: { USD: "US Dollar", EUR: "Euro", GBP: "Pound", INR: "Rupee", JPY: "Yen", AUD: "AUD", CAD: "CAD" },
            length: { m: "Meters", cm: "Centimeters", mm: "Millimeters", km: "Kilometers", in: "Inches", ft: "Feet", yd: "Yards", mi: "Miles", nm: "Nautical Miles" },
            weight: { kg: "Kilograms", g: "Grams", mg: "Milligrams", lb: "Pounds", oz: "Ounces", t: "Metric Tonnes" },
            temperature: { c: "Celsius (°C)", f: "Fahrenheit (°F)", k: "Kelvin (K)" },
            data: { b: "Bytes", kb: "KB", mb: "MB", gb: "GB", tb: "TB", pb: "Petabytes", kib: "KiB", mib: "MiB", gib: "GiB", tib: "TiB" },
            time: { s: "Seconds", min: "Minutes", hr: "Hours", day: "Days", wk: "Weeks", yr: "Years" },
            volume: { l: "Liters", ml: "Milliliters", gal: "US Gallons", qt: "US Quarts", pt: "US Pints", cup: "US Cups", floz: "US Fluid Ounces" },
            area: { sqm: "Sq Meters", sqkm: "Sq Kilometers", sqmi: "Sq Miles", ac: "Acres", ha: "Hectares", sqft: "Sq Feet", sqin: "Sq Inches" },
            speed: { mps: "Meters/Sec", kmph: "Km/Hour", mph: "Miles/Hour", kn: "Knots" }
        };

        const conversionRates = {
            length: { m: 1, cm: 0.01, mm: 0.001, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144, mi: 1609.344, nm: 1852 },
            weight: { kg: 1, g: 0.001, mg: 0.000001, lb: 0.45359237, oz: 0.02834952, t: 1000 },
            data: { b: 1, kb: 1e3, mb: 1e6, gb: 1e9, tb: 1e12, pb: 1e15, kib: 1024, mib: 1048576, gib: 1073741824, tib: 1099511627776 },
            time: { s: 1, min: 60, hr: 3600, day: 86400, wk: 604800, yr: 31536000 },
            volume: { l: 1, ml: 0.001, gal: 3.78541, qt: 0.946353, pt: 0.473176, cup: 0.24, floz: 0.0295735 },
            area: { sqm: 1, sqkm: 1e6, sqmi: 2589988.11, ac: 4046.86, ha: 10000, sqft: 0.092903, sqin: 0.00064516 },
            speed: { mps: 1, kmph: 0.277778, mph: 0.44704, kn: 0.514444 }
        };

        // --- 2. CORE FUNCTIONS ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            const targetTab = document.getElementById('tab-' + tabId);
            const targetBtn = document.getElementById('btn-' + tabId);
            if (targetTab && targetBtn) {
                targetTab.classList.add('active');
                targetBtn.classList.add('active');
                localStorage.setItem('activeTab', tabId);
            }
        }

        function applyTheme(themeId) {
            document.documentElement.setAttribute('data-theme', themeId);
            localStorage.setItem('appTheme', themeId);
            let activeObj = allThemes.find(t => t.id === themeId);
            if(activeObj) document.getElementById('meta-theme-color').setAttribute('content', activeObj.color);
            if(document.getElementById('theme-grid')) renderThemes(); 
        }

        function renderThemes() {
            const grid = document.getElementById('theme-grid');
            if(!grid) return;
            const q = (document.getElementById('search-theme-input')?.value || "").toLowerCase();
            const currentTheme = document.documentElement.getAttribute('data-theme');
            grid.innerHTML = '';
            allThemes.forEach(t => {
                if (t.name.toLowerCase().includes(q)) {
                    let div = document.createElement('div');
                    div.className = 'theme-btn-card ' + (currentTheme === t.id ? 'active-theme' : '');
                    div.innerHTML = `<span style="display:inline-block; width:14px; height:14px; border-radius:50%; background:${t.color}; box-shadow: 0 0 2px rgba(0,0,0,0.5);"></span>${t.name}`;
                    div.onclick = () => applyTheme(t.id);
                    grid.appendChild(div);
                }
            });
        }

        // --- 3. CALCULATOR FUNCTIONS ---
        function append(c) { document.getElementById('display').value += c; }
        function clearDisplay() { document.getElementById('display').value = ''; document.getElementById('result').innerText = '0'; }
        function deleteLast() { let d = document.getElementById('display'); d.value = d.value.slice(0, -1); }
        function getCleanExpression() { return document.getElementById('display').value.replace(/x/g, '*').replace(/÷/g, '/').replace(/\^/g, '**').replace(/π/g, 'Math.PI').replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(').replace(/√\(/g, 'Math.sqrt('); }
        
        function calculateBODMAS() {
            try {
                let orig = document.getElementById('display').value; let expr = getCleanExpression(); if (!expr) return;
                let res = eval(expr); 
                if (isNaN(res) || !isFinite(res)) throw new Error("Invalid");
                res = Math.round(res * 100000) / 100000;
                document.getElementById('result').innerText = "BODMAS: " + res;
                calcHistory.push({ expr: orig, res: res, type: 'BODMAS' }); renderHistory();
            } catch (e) { document.getElementById('result').innerText = "Error"; }
        }
        
        function calculateNoBODMAS() {
            try {
                let orig = document.getElementById('display').value; if (!orig) return;
                let clean = orig.replace(/x/g, '*').replace(/÷/g, '/');
                if (clean.includes('sin') || clean.includes('cos') || clean.includes('tan') || clean.includes('√') || clean.includes('π') || clean.includes('^')) {
                    document.getElementById('result').innerText = "Use BODMAS for scientific math."; return;
                }
                clean = clean.replace(/[+\-*/.]+$/, '');
                let tokens = clean.match(/(\d+\.?\d*)|([+\-*/])/g);
                if (!tokens) return;
                let total = parseFloat(tokens[0]);
                for (let i = 1; i < tokens.length; i += 2) { 
                    let op = tokens[i]; let nextNum = parseFloat(tokens[i + 1]); 
                    if (isNaN(nextNum)) break;
                    if (op === '+') total += nextNum; else if (op === '-') total -= nextNum; else if (op === '*') total *= nextNum; else if (op === '/') total /= nextNum; 
                }
                total = Math.round(total * 100000) / 100000; 
                document.getElementById('result').innerText = "Seq: " + total;
                calcHistory.push({ expr: orig, res: total, type: 'Seq' }); renderHistory();
            } catch (e) { document.getElementById('result').innerText = "Error"; }
        }

        function renderHistory() { 
            let l = document.getElementById('history-list'); if(!l) return;
            l.innerHTML = ''; calcHistory.slice().reverse().forEach(h => {
                let d = document.createElement('div'); d.className = 'history-item';
                d.innerHTML = `<span style="color:var(--text-muted); font-size: 0.9rem;">${h.expr} =</span><br/>${h.type}: <strong>${h.res}</strong>`;
                l.appendChild(d);
            });
            localStorage.setItem('calcHistory', JSON.stringify(calcHistory));
        }
        function clearHistory() { calcHistory = []; localStorage.removeItem('calcHistory'); renderHistory(); }

        // --- 4. CONVERTER FUNCTIONS ---
        function getCategoryOfUnit(u) { for (let c in unitCategories) { if (unitCategories[c].hasOwnProperty(u)) return c; } return null; }

        function renderFromDropdown() {
            const q = (document.getElementById('search-units')?.value || "").toLowerCase();
            let fromSelect = document.getElementById('conv-from'); if(!fromSelect) return;
            let currentVal = fromSelect.value;
            fromSelect.innerHTML = '';
            for (let cat in unitCategories) {
                let group = document.createElement('optgroup'); group.label = cat.toUpperCase(); let added = false;
                for (let key in unitCategories[cat]) {
                    if (unitCategories[cat][key].toLowerCase().includes(q) || key.toLowerCase().includes(q)) { group.appendChild(new Option(unitCategories[cat][key], key)); added = true; }
                }
                if (added) fromSelect.appendChild(group);
            }
            if (fromSelect.querySelector(`option[value="${currentVal}"]`)) fromSelect.value = currentVal;
            updateToDropdown(); 
        }

        function updateToDropdown() {
            let fromSelect = document.getElementById('conv-from'); let toSelect = document.getElementById('conv-to');
            if (!fromSelect || !toSelect || !fromSelect.value) return;
            let cat = getCategoryOfUnit(fromSelect.value); let prevTo = toSelect.value;
            toSelect.innerHTML = '';
            if(cat) {
                for (let key in unitCategories[cat]) { toSelect.appendChild(new Option(unitCategories[cat][key], key)); }
                if (unitCategories[cat].hasOwnProperty(prevTo)) toSelect.value = prevTo;
            }
            convertUnits();
        }

        function convertUnits() {
            let valInput = document.getElementById('conv-val');
            let fromSelect = document.getElementById('conv-from');
            let toSelect = document.getElementById('conv-to');
            let resBox = document.getElementById('conv-result');
            if(!valInput || !fromSelect || !toSelect || !resBox) return;

            let v = parseFloat(valInput.value);
            let f = fromSelect.value; let t = toSelect.value;
            if (isNaN(v) || !f || !t) { resBox.innerText = "Waiting..."; return; }
            
            localStorage.setItem('convVal', v); localStorage.setItem('convFrom', f); localStorage.setItem('convTo', t);
            let res = null; let cat = getCategoryOfUnit(f);
            if (f === t) { res = v; }
            else if (cat === 'currency') {
                if (!liveCurrencyRates || !liveCurrencyRates[f]) { resBox.innerText = "Offline"; return; }
                res = (v / liveCurrencyRates[f]) * liveCurrencyRates[t];
            } 
            else if (cat === 'temperature') {
                let tempC = (f === 'c') ? v : (f === 'f') ? (v - 32) * 5/9 : v - 273.15;
                res = (t === 'c') ? tempC : (t === 'f') ? (tempC * 9/5) + 32 : tempC + 273.15;
            } 
            else {
                res = (v * conversionRates[cat][f]) / conversionRates[cat][t];
            }
            resBox.innerText = Math.round(res * 10000) / 10000 + " " + t.toUpperCase();
        }

        async function fetchCurrencyRates() {
            try {
                let res = await fetch('https://open.er-api.com/v6/latest/USD');
                let data = await res.json(); liveCurrencyRates = data.rates;
                localStorage.setItem('savedRates', JSON.stringify(liveCurrencyRates));
            } catch (err) {}
        }

        // --- 5. BOOT ENGINE ---
        window.addEventListener('load', function() {
            try {
                if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
                applyTheme(localStorage.getItem('appTheme') || 'dark');
                switchTab(localStorage.getItem('activeTab') || 'calc');
                let savedHist = localStorage.getItem('calcHistory'); if (savedHist) { calcHistory = JSON.parse(savedHist); renderHistory(); }
                renderFromDropdown(); renderThemes();
                if (navigator.onLine) fetchCurrencyRates();
            } catch(e) { console.error("Boot Error", e); }
        });
    </script>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" id="meta-theme-color" content="#313338">
    <title>Blurple Pro App</title>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); margin: 0; height: 100dvh; display: flex; flex-direction: column; color: var(--text-main); overflow: hidden; }
        .tab-bar { display: flex; background: var(--bg-sec); padding: 5px; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 15px 5px; background: transparent; border: none; color: var(--text-muted); font-size: 1rem; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; display:flex; justify-content:center; align-items:center; gap: 5px;}
        .tab-btn.active { color: var(--text-main); border-bottom: 3px solid var(--accent); }
        .tab-btn svg { width: 16px; height: 16px; fill: currentColor; }
        .tab-content { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
        .tab-content.active { display: flex; }
        #display { width: 100%; padding: 20px; margin-bottom: 10px; font-size: 2rem; background: var(--bg-sec); border: none; color: var(--text-main); border-radius: 12px; text-align: right; outline: none; }
        .result-box { padding: 15px; margin-bottom: 20px; border-radius: 12px; background: var(--bg-card); font-size: 1.5rem; font-weight: bold; border-left: 5px solid var(--accent); text-align: right; min-height: 30px; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        button.key { background: var(--bg-card); border: none; border-radius: 12px; color: var(--text-main); font-size: 1.2rem; cursor: pointer; font-weight: bold; padding: 15px 0; }
        button.key:active { transform: scale(0.95); opacity: 0.8; }
        button.key.sci { background: var(--sci-btn); font-size: 1rem; }
        button.key.op { background: var(--accent); color: var(--bg-main); }
        button.key.action { background: #ed4245; color: white;}
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-calc { padding: 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 12px; color: white; cursor: pointer; }
        .btn-bodmas { background: #23a559; } .btn-no-bodmas { background: var(--accent); color: var(--bg-main); }
        .history-container { background: var(--bg-sec); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .history-item { background: var(--bg-card); padding: 10px; border-radius: 8px; font-size: 1.1rem; text-align: right; border-left: 4px solid var(--accent); margin-bottom: 10px; }
        .conv-group, .theme-group { margin-bottom: 15px; }
        select, .conv-input { width: 100%; padding: 15px; font-size: 1.2rem; background: var(--bg-card); border: none; color: var(--text-main); border-radius: 8px; outline: none; }
        .btn-convert { width: 100%; padding: 15px; background: var(--accent); border: none; color: var(--bg-main); font-size: 1.2rem; border-radius: 8px; font-weight: bold; cursor: pointer;}
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .theme-btn-card { background: var(--bg-card); border: 2px solid transparent; padding: 15px 10px; border-radius: 8px; color: var(--text-main); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .theme-btn-card.active-theme { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('calc')" id="btn-calc">Calc</button>
    <button class="tab-btn" onclick="switchTab('conv')" id="btn-conv">Conv</button>
    <button class="tab-btn" onclick="switchTab('theme')" id="btn-theme">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zM6.5 11.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-4c-.83 0-1.5-.67-1.5-1.5S9.67 4.5 10.5 4.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm5 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        Themes
    </button>
</div>

<div id="tab-calc" class="tab-content active">
    <input type="text" id="display" readonly placeholder="0">
    <div class="result-box" id="result">0</div>
    <div class="keypad">
        <button class="key sci" onclick="append('sin(')">sin</button> <button class="key sci" onclick="append('cos(')">cos</button> <button class="key sci" onclick="append('tan(')">tan</button> <button class="key sci" onclick="append('√(')">√</button>
        <button class="key action" onclick="clearDisplay()">C</button> <button class="key sci" onclick="append('^')">^</button> <button class="key sci" onclick="append('π')">π</button> <button class="key op" onclick="append('÷')">÷</button>
        <button class="key" onclick="append('7')">7</button> <button class="key" onclick="append('8')">8</button> <button class="key" onclick="append('9')">9</button> <button class="key op" onclick="append('x')">x</button>
        <button class="key" onclick="append('4')">4</button> <button class="key" onclick="append('5')">5</button> <button class="key" onclick="append('6')">6</button> <button class="key op" onclick="append('-')">-</button>
        <button class="key" onclick="append('1')">1</button> <button class="key" onclick="append('2')">2</button> <button class="key" onclick="append('3')">3</button> <button class="key op" onclick="append('+')">+</button>
        <button class="key" onclick="append('0')">0</button> <button class="key" onclick="append('.')">.</button> <button class="key" onclick="append(')')">)</button> <button class="key action" onclick="deleteLast()">DEL</button>
    </div>
    <div class="calc-row">
        <button class="btn-calc btn-bodmas" onclick="calculateBODMAS()">= BODMAS</button>
        <button class="btn-calc btn-no-bodmas" onclick="calculateNoBODMAS()">= Seq</button>
    </div>
    <div class="history-container"><div id="history-list"></div></div>
</div>

<div id="tab-conv" class="tab-content">
    <div class="conv-group"><input type="text" id="search-units"
