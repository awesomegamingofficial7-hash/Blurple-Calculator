<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#23272a">
    
    <title>Blurple Pro App</title>
    
    <style>
        /* --- NATIVE APP FIXES --- */
        * {
            -webkit-tap-highlight-color: transparent; /* Kills the blue flash */
            box-sizing: border-box;
        }
        button, .tab-btn {
            user-select: none; /* Stops text highlighting on long-press */
            -webkit-user-select: none;
            touch-action: manipulation; /* Makes buttons tap faster */
        }
        input, select {
            user-select: auto; /* Keeps your input boxes working normally */
            -webkit-user-select: auto;
        }

        /* --- BASE STYLING --- */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #23272a; margin: 0; height: 100dvh; display: flex; flex-direction: column; color: #ffffff; overflow: hidden; }
        .tab-bar { display: flex; background: #1e1f22; padding: 10px; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 15px; background: transparent; border: none; color: #8e9297; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s;}
        .tab-btn.active { color: #ffffff; border-bottom: 3px solid #5865F2; }
        .tab-content { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        /* --- CALCULATOR UI --- */
        #display { width: 100%; padding: 20px; margin-bottom: 10px; font-size: 2rem; background: #1e1f22; border: none; color: #ffffff; border-radius: 12px; text-align: right; outline: none; }
        #display:focus { border: 2px solid #5865F2; }
        .result-box { padding: 15px; margin-bottom: 20px; border-radius: 12px; background: #2c2f33; font-size: 1.5rem; font-weight: bold; border-left: 5px solid #5865F2; text-align: right; min-height: 30px; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        button.key { background: #2c2f33; border: none; border-radius: 12px; color: white; font-size: 1.2rem; cursor: pointer; font-weight: bold; padding: 15px 0; transition: transform 0.1s; }
        button.key:active { background: #1e1f22; transform: scale(0.95); }
        button.key.sci { background: #4f545c; font-size: 1rem; }
        button.key.op { background: #5865F2; }
        button.key.action { background: #ed4245; }
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-calc { padding: 20px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 12px; color: white; cursor: pointer; }
        .btn-calc:active { transform: scale(0.98); }
        .btn-bodmas { background: #4CAF50; } .btn-no-bodmas { background: #5865F2; }
        
        /* --- HISTORY UI --- */
        .history-container { background: #1e1f22; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; margin-bottom: 20px; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: #8e9297; font-weight: bold; }
        .btn-clear-history { background: transparent; color: #ed4245; border: none; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        #history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: #2c2f33; padding: 10px; border-radius: 8px; font-size: 1.1rem; text-align: right; border-left: 4px solid #5865F2; }
        .history-item.seq { border-left-color: #2196F3; } 

        /* --- CONVERTER UI --- */
        .conv-group { margin-bottom: 15px; }
        .conv-group label { display: block; margin-bottom: 8px; color: #8e9297; font-weight: bold; }
        select, input.conv-input { width: 100%; padding: 15px; font-size: 1.2rem; background: #2c2f33; border: none; color: white; border-radius: 8px; outline: none; }
        input.conv-input:focus { border: 2px solid #5865F2; padding: 13px;}
        optgroup { background: #1e1f22; color: #8e9297; font-weight: bold; }
        option { background: #2c2f33; color: white; }
        .btn-convert { width: 100%; padding: 15px; background: #5865F2; border: none; color: white; font-size: 1.2rem; border-radius: 8px; font-weight: bold; margin-bottom: 30px; cursor: pointer;}
        .btn-convert:active { transform: scale(0.98); }
        
        /* --- TOAST NOTIFICATIONS --- */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0px 4px 12px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.5s, bottom 0.5s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        #toast.offline { background-color: #ed4245; } #toast.online { background-color: #4CAF50; } 
    </style>
</head>
<body>

<div id="toast">Message here</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('calc')" id="btn-calc">Calculator</button>
    <button class="tab-btn" onclick="switchTab('conv')" id="btn-conv">Converter</button>
</div>

<div id="tab-calc" class="tab-content active">
    <input type="text" id="display" readonly placeholder="0">
    <div class="result-box" id="result">0</div>
    
    <div class="keypad">
        <button class="key sci" onclick="append('sin(')">sin</button> <button class="key sci" onclick="append('cos(')">cos</button> <button class="key sci" onclick="append('tan(')">tan</button> <button class="key sci" onclick="append('√(')">√</button>
        <button class="key action" onclick="clearDisplay()">C</button> <button class="key sci" onclick="append('^')">^</button> <button class="key sci" onclick="append('π')">π</button> <button class="key op" onclick="append('÷')">÷</button>
        <button class="key" onclick="append('7')">7</button> <button class="key" onclick="append('8')">8</button> <button class="key" onclick="append('9')">9</button> <button class="key op" onclick="append('x')">x</button>
        <button class="key" onclick="append('4')">4</button> <button class="key" onclick="append('5')">5</button> <button class="key" onclick="append('6')">6</button> <button class="key op" onclick="append('-')">-</button>
        <button class="key" onclick="append('1')">1</button> <button class="key" onclick="append('2')">2</button> <button class="key" onclick="append('3')">3</button> <button class="key op" onclick="append('+')">+</button>
        <button class="key" onclick="append('0')">0</button> <button class="key" onclick="append('.')">.</button> <button class="key" onclick="append(')')">)</button> <button class="key action" onclick="deleteLast()">DEL</button>
    </div>
    
    <div class="calc-row">
        <button class="btn-calc btn-bodmas" onclick="calculateBODMAS()">= BODMAS</button>
        <button class="btn-calc btn-no-bodmas" onclick="calculateNoBODMAS()">= Sequential</button>
    </div>
    
    <div class="history-container">
        <div class="history-header"><span>History</span><button class="btn-clear-history" onclick="clearHistory()">Clear</button></div>
        <div id="history-list"></div>
    </div>
</div>

<div id="tab-conv" class="tab-content">
    
    <div class="conv-group">
        <input type="text" id="search-units" class="conv-input" placeholder="🔍 Search units (e.g., 'gigabyte')" onkeyup="renderFromDropdown()">
    </div>

    <div class="conv-group">
        <label>Value:</label>
        <input type="number" id="conv-val" class="conv-input" placeholder="0">
    </div>
    
    <div class="conv-group">
        <label>From:</label>
        <select id="conv-from" onchange="updateToDropdown()"></select>
    </div>
    
    <div class="conv-group">
        <label>To:</label>
        <select id="conv-to"></select>
    </div>
    
    <button class="btn-convert" onclick="convertUnits()">Convert</button>
    <div class="result-box" style="text-align:center;" id="conv-result">Result</div>
</div>

<script>
    let calcHistory = [];
    let liveCurrencyRates = {}; 
    
    // THE UNIT DICTIONARY
    const unitCategories = {
        currency: { USD: "US Dollar", EUR: "Euro", GBP: "British Pound", INR: "Indian Rupee", JPY: "Japanese Yen", AUD: "Australian Dollar", CAD: "Canadian Dollar" },
        length: { m: "Meters (m)", cm: "Centimeters (cm)", mm: "Millimeters (mm)", km: "Kilometers (km)", in: "Inches (in)", ft: "Feet (ft)", yd: "Yards (yd)", mi: "Miles (mi)" },
        weight: { kg: "Kilograms (kg)", g: "Grams (g)", mg: "Milligrams (mg)", lb: "Pounds (lb)", oz: "Ounces (oz)" },
        temperature: { c: "Celsius (°C)", f: "Fahrenheit (°F)", k: "Kelvin (K)" },
        data: { b: "Bytes (B)", kb: "Kilobytes (KB)", mb: "Megabytes (MB)", gb: "Gigabytes (GB)", tb: "Terabytes (TB)", kib: "Kibibytes (KiB)", mib: "Mebibytes (MiB)", gib: "Gibibytes (GiB)", tib: "Tebibytes (TiB)" },
        time: { s: "Seconds (s)", min: "Minutes (min)", hr: "Hours (hr)", day: "Days (day)" }
    };

    // UNIVERSAL BASE MULTIPLIERS
    const conversionRates = {
        length: { m: 1, cm: 0.01, mm: 0.001, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144, mi: 1609.344 },
        weight: { kg: 1, g: 0.001, mg: 0.000001, lb: 0.45359237, oz: 0.02834952 },
        data: { b: 1, kb: 1e3, mb: 1e6, gb: 1e9, tb: 1e12, kib: 1024, mib: 1048576, gib: 1073741824, tib: 1099511627776 },
        time: { s: 1, min: 60, hr: 3600, day: 86400 }
    };

    /* --- TOAST & NETWORK LOGIC --- */
    function showToast(msg, type) {
        let t = document.getElementById("toast"); t.innerText = msg; t.className = "show " + type;
        setTimeout(() => { t.className = t.className.replace("show " + type, ""); }, 4000);
    }

    window.addEventListener('offline', () => showToast("Running in offline mode", "offline"));
    window.addEventListener('online', () => { showToast("Internet Connection Live. Updating Rates", "online"); fetchCurrencyRates(); });

    async function fetchCurrencyRates() {
        try {
            let res = await fetch('https://open.er-api.com/v6/latest/USD');
            let data = await res.json();
            liveCurrencyRates = data.rates;
            localStorage.setItem('savedRates', JSON.stringify(liveCurrencyRates));
        } catch (err) { console.log("Offline mode active."); }
    }

    /* --- INITIALIZATION --- */
    window.onload = function() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker Registered"))
            .catch(err => console.log("Service Worker Failed", err));
        }

        let savedTab = localStorage.getItem('activeTab'); if (savedTab) switchTab(savedTab);
        let savedHist = localStorage.getItem('calcHistory'); if (savedHist) { calcHistory = JSON.parse(savedHist); renderHistory(); }
        
        renderFromDropdown(); 
        
        let savedConvVal = localStorage.getItem('convVal');
        let savedConvFrom = localStorage.getItem('convFrom');
        let savedConvTo = localStorage.getItem('convTo');
        
        if (savedConvVal) document.getElementById('conv-val').value = savedConvVal;
        if (savedConvFrom) { document.getElementById('conv-from').value = savedConvFrom; updateToDropdown(); if (savedConvTo) document.getElementById('conv-to').value = savedConvTo; }

        let savedRates = localStorage.getItem('savedRates'); if (savedRates) liveCurrencyRates = JSON.parse(savedRates);
        if (navigator.onLine) fetchCurrencyRates();
        if (savedConvVal) convertUnits();
    }

    /* --- TAB LOGIC --- */
    function switchTab(t) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        document.getElementById('btn-' + t).classList.add('active');
        localStorage.setItem('activeTab', t);
    }

    /* --- CALCULATOR LOGIC --- */
    function append(c) { document.getElementById('display').value += c; }
    function clearDisplay() { document.getElementById('display').value = ''; document.getElementById('result').innerText = '0'; }
    function deleteLast() { let d = document.getElementById('display'); d.value = d.value.slice(0, -1); }
    function getCleanExpression() { return document.getElementById('display').value.replace(/x/g, '*').replace(/÷/g, '/').replace(/\^/g, '**').replace(/π/g, 'Math.PI').replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(').replace(/√\(/g, 'Math.sqrt('); }
    
    function calculateBODMAS() {
        try {
            let orig = document.getElementById('display').value; let expr = getCleanExpression(); if (!expr) return;
            let res = Math.round(eval(expr) * 10000) / 10000;
            document.getElementById('result').innerText = "BODMAS: " + res;
            calcHistory.push({ expr: orig, res: res, type: 'BODMAS' }); localStorage.setItem('calcHistory', JSON.stringify(calcHistory)); renderHistory();
        } catch (e) { document.getElementById('result').innerText = "Error"; }
    }
    
    function calculateNoBODMAS() {
        try {
            let orig = document.getElementById('display').value; let expr = getCleanExpression(); if (!expr) return;
            if (expr.includes('Math') || expr.includes('**')) { document.getElementById('result').innerText = "Sequential is for basic math (+, -, x, ÷)."; return; }
            let nums = expr.split(/([+\-*/])/).filter(x => !['+', '-', '*', '/'].includes(x)); let ops = expr.split('').filter(x => ['+', '-', '*', '/'].includes(x));
            let total = parseFloat(nums[0]);
            for (let i = 0; i < ops.length; i++) { let n = parseFloat(nums[i + 1]); let op = ops[i]; if (op == '+') total += n; else if (op == '-') total -= n; else if (op == '*') total *= n; else if (op == '/') total /= n; }
            total = Math.round(total * 10000) / 10000; document.getElementById('result').innerText = "Sequential: " + total;
            calcHistory.push({ expr: orig, res: total, type: 'Seq' }); localStorage.setItem('calcHistory', JSON.stringify(calcHistory)); renderHistory();
        } catch (e) { document.getElementById('result').innerText = "Error"; }
    }
    function renderHistory() { let l = document.getElementById('history-list'); l.innerHTML = ''; calcHistory.slice().reverse().forEach(h => { let d = document.createElement('div'); d.className = 'history-item ' + (h.type === 'Seq' ? 'seq' : ''); d.innerHTML = `<span style="font-size:0.9rem; color:#8e9297;">${h.expr} =</span><br/>${h.type}: <strong>${h.res}</strong>`; l.appendChild(d); }); }
    function clearHistory() { calcHistory = []; localStorage.removeItem('calcHistory'); renderHistory(); }

    /* --- SMART CONVERTER ENGINE --- */
    function getCategoryOfUnit(u) { for (let c in unitCategories) { if (unitCategories[c].hasOwnProperty(u)) return c; } return null; }

    function renderFromDropdown() {
        let q = document.getElementById('search-units').value.toLowerCase();
        let fromSelect = document.getElementById('conv-from');
        let currentVal = fromSelect.value;
        fromSelect.innerHTML = '';

        for (let cat in unitCategories) {
            let group = document.createElement('optgroup'); group.label = cat.toUpperCase();
            let added = false;
            for (let key in unitCategories[cat]) {
                let name = unitCategories[cat][key];
                if (name.toLowerCase().includes(q) || key.toLowerCase().includes(q)) {
                    group.appendChild(new Option(name, key)); added = true;
                }
            }
            if (added) fromSelect.appendChild(group);
        }
        if (fromSelect.querySelector(`option[value="${currentVal}"]`)) fromSelect.value = currentVal;
        updateToDropdown(); 
    }

    function updateToDropdown() {
        let fromSelect = document.getElementById('conv-from'); let toSelect = document.getElementById('conv-to');
        if (!fromSelect.value) { toSelect.innerHTML = ''; return; }
        let cat = getCategoryOfUnit(fromSelect.value); let prevTo = toSelect.value;
        toSelect.innerHTML = '';
        for (let key in unitCategories[cat]) { toSelect.appendChild(new Option(unitCategories[cat][key], key)); }
        if (unitCategories[cat].hasOwnProperty(prevTo)) toSelect.value = prevTo;
        convertUnits();
    }

    function convertUnits() {
        let v = parseFloat(document.getElementById('conv-val').value);
        let f = document.getElementById('conv-from').value; let t = document.getElementById('conv-to').value;
        let resBox = document.getElementById('conv-result');
        if (isNaN(v) || !f || !t) { resBox.innerText = "Waiting for input..."; return; }

        localStorage.setItem('convVal', v); localStorage.setItem('convFrom', f); localStorage.setItem('convTo', t);

        let res = null; let cat = getCategoryOfUnit(f);

        if (f === t) { res = v; }
        else if (cat === 'currency') {
            if (!liveCurrencyRates || !liveCurrencyRates[f]) { resBox.innerText = "Currency rates offline."; return; }
            res = (v / liveCurrencyRates[f]) * liveCurrencyRates[t];
        } 
        else if (cat === 'temperature') {
            let tempC = (f === 'c') ? v : (f === 'f') ? (v - 32) * 5/9 : v - 273.15;
            res = (t === 'c') ? tempC : (t === 'f') ? (tempC * 9/5) + 32 : tempC + 273.15;
        } 
        else {
            let baseVal = v * conversionRates[cat][f];
            res = baseVal / conversionRates[cat][t];
        }

        if(res < 0.0001 || res > 999999) { resBox.innerText = `${v} ${f.toUpperCase()} = ${res.toExponential(4)} ${t.toUpperCase()}`; } 
        else { resBox.innerText = `${v} ${f.toUpperCase()} = ${Math.round(res * 10000) / 10000} ${t.toUpperCase()}`; }
    }
</script>

</body>
    </html>
